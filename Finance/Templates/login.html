<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#ff8a00;
    --primary-dark:#e67600;
    --primary-light:#fff2e5;
    --accent:#ffb703;
    --white:#ffffff;
    --text-dark:#2b2b2b;
    --border:#e5e5e5;
    --shadow:rgba(0,0,0,0.18);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#ff8a00,#ff6a00);
}


.container{
    width:950px;
    height:520px;
    background:rgba(255,255,255,0.95);
    border-radius:20px;
    display:flex;
    box-shadow:0 25px 50px var(--shadow);
    overflow:hidden;
    backdrop-filter:blur(10px);
}


.left{
    width:50%;
    background:linear-gradient(160deg,var(--primary),var(--primary-dark));
    color:var(--white);
    padding:60px;
    position:relative;
}

.left h1{
    font-size:32px;
    line-height:1.3;
    margin-bottom:15px;
}

.left p{
    font-size:15px;
    opacity:0.9;
}


.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.25);
}

.circle.one{
    width:140px;
    height:140px;
    top:30px;
    right:40px;
}

.circle.two{
    width:90px;
    height:90px;
    bottom:40px;
    left:40px;
}


.right{
    width:50%;
    padding:60px;
}

.logo{
    width:50px;
    height:50px;
    background:var(--primary);
    color:var(--white);
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
    margin-bottom:25px;
}

.right h2{
    margin-bottom:25px;
    color:var(--text-dark);
}


.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid var(--border);
    outline:none;
    transition:0.3s;
}

.input-box input:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 3px var(--primary-light);
}


.options{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    margin-bottom:25px;
}

.options a{
    color:var(--primary);
    text-decoration:none;
}


.login-btn{
    width:100%;
    padding:14px;
    border:none;
    background:var(--primary);
    color:var(--white);
    font-size:16px;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:var(--primary-dark);
    transform:translateY(-2px);
}


.or{
    text-align:center;
    margin:25px 0;
    font-size:14px;
    color:#999;
}


.social{
    display:flex;
    justify-content:center;
    gap:15px;
}

.social button{
    width:45px;
    height:45px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#fff;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.social button:hover{
    background:var(--primary-light);
    border-color:var(--primary);
}


.signup{
    text-align:center;
    margin-top:25px;
    font-size:14px;
}

.signup a{
    color:var(--primary);
    font-weight:500;
    text-decoration:none;
}


@media(max-width:768px){
    .container{
        flex-direction:column;
        height:auto;
        width:90%;
    }
    .left,.right{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="left">
        <h1>Save your money<br>with Zenny</h1>
        <p>Your smart financial helper</p>

        <div class="circle one"></div>
        <div class="circle two"></div>
    </div>

    <div class="right">
        <div class="logo">Z</div>
        <h2>Welcome Back!</h2>

        <div class="input-box">
            <input type="email" placeholder="Enter your email">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>

        <div class="options">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Reset Password</a>
        </div>

        <button class="login-btn">Login</button>

        <div class="or">or</div>

        <div class="social">
            <button>G</button>
            <button>f</button>
            <button>A</button>
        </div>

        <div class="signup">
            Don’t have an account? <a href="#">Create Account</a>
        </div>
    </div>

</div>

</body>
</html>
